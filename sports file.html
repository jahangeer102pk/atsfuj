<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Azports.uk - Live Sports TV</title>

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0c14;
            --surface: #121620;
            --surface2: #1a1f2e;
            --surface3: #262d42;
            --primary: #e74c3c;
            --primary-glow: rgba(231, 76, 60, 0.35);
            --accent: #f1c40f;
            --text: #eef2f7;
            --text-muted: #7f8ba3;
            --radius: 14px;
            --shadow: 0 12px 44px rgba(0, 0, 0, 0.8);
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        html {
            font-size: 15px;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 12px;
            margin: 0;
            background-image: radial-gradient(ellipse at 20% 10%, #1a1f30 0%, #0a0c14 70%);
        }

        .app {
            max-width: 520px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: var(--radius);
            padding: 16px 14px 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.04);
            position: relative;
            overflow: hidden;
        }

        .app::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at 70% 20%, rgba(231, 76, 60, 0.05), transparent 60%);
            pointer-events: none;
        }

        /* ─── Header ─── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            margin-bottom: 14px;
            position: relative;
            z-index: 2;
        }

        .header__brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: -0.3px;
        }

        .header__brand-icon {
            font-size: 1.4rem;
        }

        .header__brand span {
            background: linear-gradient(135deg, var(--primary), #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header__brand small {
            font-size: 0.55rem;
            font-weight: 400;
            -webkit-text-fill-color: var(--text-muted);
            background: none;
            color: var(--text-muted);
            margin-left: 4px;
            opacity: 0.6;
        }

        .ad-status {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface2);
            padding: 5px 14px 5px 10px;
            border-radius: 40px;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .ad-status__dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00e676;
            box-shadow: 0 0 12px rgba(0, 230, 118, 0.4);
            animation: pulse-dot 2s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(0.8);
            }
        }

        .ad-status__count {
            background: var(--primary);
            color: #fff;
            font-size: 0.6rem;
            padding: 0 10px;
            border-radius: 30px;
            font-weight: 700;
            line-height: 18px;
        }

        /* ─── Player Area ─── */
        .player {
            position: relative;
            border-radius: var(--radius);
            overflow: hidden;
            background: #000;
            margin-bottom: 14px;
            aspect-ratio: 16 / 9;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.5);
        }

        .player__iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #0a0a0a;
        }

        .player__overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(6px);
            transition: opacity 0.4s;
            pointer-events: none;
            padding: 20px;
            text-align: center;
        }

        .player__overlay--hidden {
            opacity: 0;
        }

        .player__overlay-icon {
            font-size: 3rem;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        .player__overlay-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.6);
        }

        .player__overlay-sub {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .player__status {
            position: absolute;
            bottom: 10px;
            left: 12px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.6rem;
            font-weight: 600;
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.06);
            pointer-events: none;
        }

        .player__status .live {
            color: #e74c3c;
            font-weight: 700;
            animation: pulse-live 1.5s ease-in-out infinite;
        }

        @keyframes pulse-live {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        /* ─── Channel Info ─── */
        .channel-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 4px 12px 4px;
            gap: 10px;
        }

        .channel-info__name {
            font-size: 1rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .channel-info__meta {
            font-size: 0.7rem;
            color: var(--text-muted);
            background: var(--surface2);
            padding: 2px 14px;
            border-radius: 30px;
            white-space: nowrap;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        /* ─── Channel List ─── */
        .channel-list {
            margin-top: 4px;
        }

        .channel-list__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text-muted);
            padding: 8px 4px 10px 4px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            margin-top: 4px;
        }

        .channel-list__header span:last-child {
            font-size: 0.6rem;
            opacity: 0.6;
        }

        .channel-list__grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            max-height: 380px;
            overflow-y: auto;
            padding-right: 2px;
            scrollbar-width: thin;
            scrollbar-color: var(--surface2) transparent;
        }

        .channel-list__grid::-webkit-scrollbar {
            width: 3px;
        }
        .channel-list__grid::-webkit-scrollbar-thumb {
            background: var(--surface2);
            border-radius: 10px;
        }

        .channel-item {
            background: var(--surface2);
            border-radius: 10px;
            padding: 10px 10px;
            cursor: pointer;
            transition: var(--transition);
            border: 1.5px solid transparent;
            display: flex;
            align-items: center;
            gap: 10px;
            touch-action: manipulation;
            min-height: 48px;
        }

        .channel-item:active {
            transform: scale(0.96);
        }

        .channel-item--active {
            border-color: var(--primary);
            background: var(--surface3);
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.08);
        }

        .channel-item__icon {
            font-size: 1.1rem;
            flex-shrink: 0;
            width: 28px;
            text-align: center;
            opacity: 0.7;
        }

        .channel-item__name {
            font-size: 0.78rem;
            font-weight: 500;
            line-height: 1.2;
            word-break: break-word;
            flex: 1;
        }

        .channel-item__badge {
            font-size: 0.5rem;
            background: var(--primary);
            color: #fff;
            padding: 1px 8px;
            border-radius: 20px;
            font-weight: 700;
            flex-shrink: 0;
            letter-spacing: 0.3px;
        }

        /* ─── Ad Blocker Log (compact) ─── */
        .blocker-log {
            margin-top: 12px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 0.6rem;
            color: var(--text-muted);
            max-height: 56px;
            overflow-y: auto;
            font-family: 'SF Mono', 'Courier New', monospace;
            line-height: 1.6;
            scrollbar-width: thin;
            scrollbar-color: var(--surface2) transparent;
        }

        .blocker-log::-webkit-scrollbar {
            width: 3px;
        }
        .blocker-log::-webkit-scrollbar-thumb {
            background: var(--surface2);
            border-radius: 10px;
        }

        .blocker-log__entry {
            display: flex;
            gap: 8px;
            opacity: 0.6;
            padding: 1px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .blocker-log__entry:last-child {
            border-bottom: none;
        }

        .blocker-log__time {
            color: var(--text-muted);
            opacity: 0.4;
            min-width: 44px;
            flex-shrink: 0;
        }

        .blocker-log__msg {
            word-break: break-all;
        }
        .blocker-log__msg .highlight {
            color: #00e676;
            font-weight: 600;
        }

        /* ─── Responsive ─── */
        @media (max-width: 420px) {
            .app {
                padding: 12px 10px 16px;
            }
            .channel-list__grid {
                grid-template-columns: 1fr 1fr;
                gap: 6px;
            }
            .channel-item {
                padding: 8px 8px;
                min-height: 42px;
            }
            .channel-item__name {
                font-size: 0.7rem;
            }
            .header__brand {
                font-size: 0.95rem;
            }
            .header__brand small {
                font-size: 0.5rem;
            }
            .ad-status {
                font-size: 0.55rem;
                padding: 4px 10px 4px 8px;
            }
            .player__overlay-icon {
                font-size: 2.2rem;
            }
            .player__overlay-title {
                font-size: 0.85rem;
            }
        }

        @media (max-width: 360px) {
            .channel-list__grid {
                grid-template-columns: 1fr 1fr;
                gap: 5px;
            }
            .channel-item {
                padding: 6px 6px;
                min-height: 38px;
            }
            .channel-item__name {
                font-size: 0.65rem;
            }
            .channel-item__icon {
                font-size: 0.9rem;
                width: 22px;
            }
        }

        @media (min-width: 600px) {
            .app {
                padding: 24px 22px 28px;
                max-width: 600px;
            }
            .channel-list__grid {
                grid-template-columns: 1fr 1fr 1fr;
            }
        }

        /* ─── Utilities ─── */
        .hidden {
            display: none !important;
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--surface2);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="app" id="app">

        <!-- ─── HEADER ─── -->
        <header class="header">
            <div class="header__brand">
                <span class="header__brand-icon">🏟️</span>
                <span>Azports.uk <small>LIVE</small></span>
            </div>
            <div class="ad-status">
                <span class="ad-status__dot"></span>
                <span>🛡️</span>
                <span class="ad-status__count" id="adCount">0</span>
            </div>
        </header>

        <!-- ─── PLAYER ─── -->
        <div class="player" id="playerContainer">
            <iframe class="player__iframe" id="playerIframe"
            src=""
            allow="autoplay; encrypted-media; fullscreen"
            loading="lazy"
            referrerpolicy="no-referrer"
        allowfullscreen>
    </iframe>
    <div class="player__overlay" id="playerOverlay">
        <div class="player__overlay-icon">🎯</div>
        <div class="player__overlay-title" id="overlayTitle">Azports.uk</div>
        <div class="player__overlay-sub" id="overlaySub">Select a channel below to start watching</div>
    </div>
    <div class="player__status">
        <span class="live">● LIVE</span> &nbsp;·&nbsp; <span id="channelStatus">Ready</span>
    </div>
</div>

<!-- ─── CHANNEL INFO ─── -->
<div class="channel-info">
    <div class="channel-info__name" id="currentChannelName">📡 No channel selected</div>
    <span class="channel-info__meta" id="channelCount">0 channels</span>
</div>

<!-- ─── CHANNEL LIST ─── -->
<div class="channel-list">
    <div class="channel-list__header">
        <span>📋 Channels</span>
        <span id="channelCountLabel">0 available</span>
    </div>
    <div class="channel-list__grid" id="channelGrid"></div>
</div>

<!-- ─── AD BLOCKER LOG ─── -->
<div class="blocker-log" id="blockerLog">
    <div class="blocker-log__entry">
        <span class="blocker-log__time">init</span>
        <span class="blocker-log__msg">🛡️ Azports Shield: Active &amp; blocking</span>
    </div>
</div>

</div>

<script>
    /* ═══════════════════════════════════════════════════════════════
       🛡️  AZPORTS SHIELD — ULTRA STRONG AD BLOCKER
       Blocks: Network (fetch/XHR/Beacon), DOM insertion,
       Script/Iframe/Image src, window.open, and more.
       ═══════════════════════════════════════════════════════════════ */

    (function adBlocker() {
        'use strict';

        // ─── Expanded Block List ───
        const BLOCK_LIST = [
            // Google & DoubleClick
            'doubleclick.net', 'googleadservices.com', 'googlesyndication.com',
            'adservice.google', 'ads.google', 'google-analytics.com',
            'googletagmanager.com', 'googletag', 'pubads', 'imasdk',
            'vast', 'vpaid', 'googleusercontent.com/ads',
            // Social & Tracking
            'facebook.com/tr', 'facebook.net/tr', 'twitter.com/ads',
            'amplitude', 'segment.com', 'mixpanel',
            // Major Ad Networks
            'adnxs.com', 'appnexus', 'criteo.com', 'rubiconproject.com',
            'smartadserver.com', 'adzerk.net', 'scorecardresearch.com',
            'outbrain.com', 'taboola.com', 'amazon-adsystem.com',
            'adsrv', 'adserver', 'advertising', 'ad-delivery',
            'ad-manager', 'adzerk', 'adform', 'adroll', 'adcolony',
            'admarvel', 'adinc', 'adnami', 'adobeanalytics', 'adobedtm',
            'doubleverify', 'integralads', 'moatads', 'quantcast',
            'exelator', 'demdex', 'dpm.demdex', 'everesttech',
            'casalemedia', 'pubmatic', 'openx', 'improvedigital',
            'sovrn', 'indexexchange', 'contextweb', 'rhythmone',
            'advertising.com', 'adnet', 'adclick', 'adrotate',
            'banners', 'sponsor', 'promo', 'popup', 'popunder',
            'interstitial', 'video-ad', 'pre-roll', 'banner-ad',
            'ad-wrapper', 'ad-container', 'ad-slot', 'ad-banner',
            'ad-placement', 'ad-unit', 'ad-zone', 'ad-iframe',
            'ad-div', 'advertisement', 'sponsored', 'partner-ads',
            'affiliate', 'tracking', 'pixel', 'beacon', 'impression',
            'clicktrack', 'conversion', 'remarketing', 'retargeting',
            'audience', 'data-gathering', 'collector', 'metrics',
            'telemetry', 'pageview', 'eventtracking',
            // Common classes/IDs
            'adsbox', 'ad-container', 'ad_', '-ad-', '_ad_',
            'banner_', 'sponsored_', 'google_ads', 'dfp-', 'gpt-',
            'ima-', 'video-ads', 'ad-wrapper', 'ad-skin',
            // Additional strong patterns
            'tapad', 'eyeota', 'lotame', 'bluekai', 'agkn', 'amobee',
            'bidswitch', 'brightcove-ads', 'chartbeat', 'comscore',
            'crowdcontrol', 'innovid', 'krux', 'liverail', 'mopub',
            'sharethrough', 'thetradedesk', 'turn', 'yieldmo',
            'yldmgrimg', 'adition', 'outbrain', 'taboola', 'yahoo-ads',
            'microsoft-ads', 'adzerk', 'adnxs', 'criteo',
            'scorecardresearch', 'serving-sys', 'sitescout',
            'adswizz', 'audiomack', 'spotifyads',
        ];

        let blockedCount = 0;
        const logEntries = [];
        const MAX_LOG = 18;
        let logContainer = null;
        let countEl = null;

        function log(msg, isBlock = true) {
            const time = new Date().toLocaleTimeString();
            const entry = { time, msg, isBlock };
            logEntries.unshift(entry);
            if (logEntries.length > MAX_LOG) logEntries.pop();

            if (logContainer) {
                const html = logEntries.map(e =>
                    `<div class="blocker-log__entry">
                <span class="blocker-log__time">${e.time}</span>
                <span class="blocker-log__msg">${e.msg}</span>
              </div>`
                ).join('');
                logContainer.innerHTML = html;
            }
            if (countEl && isBlock) {
                countEl.textContent = blockedCount;
            }
        }

        function shouldBlock(url) {
            if (!url) return false;
            const lower = url.toLowerCase();
            return BLOCK_LIST.some(p => lower.includes(p.toLowerCase()));
        }

        // ─── Core: Check if element is an ad ───
        function isAdElement(el) {
            if (!el || !el.tagName) return false;
            const tag = el.tagName.toLowerCase();

            // Check src/href
            const src = el.src || el.getAttribute('src') || el.href || '';
            if (shouldBlock(src)) return true;

            // Check attributes
            const id = (el.id || '').toLowerCase();
            const cls = (el.className || '').toLowerCase();
            const combined = id + ' ' + cls;

            // Specific data attributes
            if (el.getAttribute('data-ad') !== null ||
                el.getAttribute('data-ads') !== null ||
                el.getAttribute('data-advertisement') !== null ||
                el.getAttribute('data-ad-slot') !== null ||
                el.getAttribute('data-google-query-id') !== null ||
                el.getAttribute('data-ad-client') !== null) {
                return true;
            }

            // ARIA / Role
            const role = (el.getAttribute('role') || '').toLowerCase();
            const ariaLabel = (el.getAttribute('aria-label') || '').toLowerCase();
            if (role.includes('ad') || ariaLabel.includes('ad') || ariaLabel.includes('sponsor')) return true;

            // Check against block list
            return BLOCK_LIST.some(p => {
                const pat = p.toLowerCase();
                return combined.includes(pat) ||
                    (el.getAttribute('data-*)') || '').includes(pat);
            });
        }

        // ─── 1. Network: Fetch ───
        const origFetch = window.fetch;
        window.fetch = function(...args) {
            const url = args[0]?.url || args[0] || '';
            if (shouldBlock(url)) {
                blockedCount++;
                log(`🚫 Blocked fetch: ${url.slice(0, 50)}…`, true);
                return Promise.reject(new Error('Blocked by Azports Shield'));
            }
            return origFetch.apply(this, args);
        };

        // ─── 2. Network: XHR ───
        const origXHROpen = XMLHttpRequest.prototype.open;
        const origXHRSend = XMLHttpRequest.prototype.send;
        XMLHttpRequest.prototype.open = function(method, url, ...rest) {
            this._url = url;
            return origXHROpen.call(this, method, url, ...rest);
        };
        XMLHttpRequest.prototype.send = function(...args) {
            if (this._url && shouldBlock(this._url)) {
                blockedCount++;
                log(`🚫 Blocked XHR: ${this._url.slice(0, 50)}…`, true);
                this.abort();
                return;
            }
            return origXHRSend.call(this, ...args);
        };

        // ─── 3. Network: sendBeacon ───
        const origSendBeacon = navigator.sendBeacon;
        navigator.sendBeacon = function(url, data) {
            if (shouldBlock(url)) {
                blockedCount++;
                log(`🚫 Blocked Beacon: ${url.slice(0, 50)}…`, true);
                return true;
            }
            return origSendBeacon.call(this, url, data);
        };

        // ─── 4. Window.open ───
        const origWindowOpen = window.open;
        window.open = function(url, name, features) {
            if (shouldBlock(url)) {
                blockedCount++;
                log(`🚫 Blocked window.open: ${url.slice(0, 40)}…`, true);
                return null;
            }
            return origWindowOpen.call(this, url, name, features);
        };

        // ─── 5. Image src ───
        const origImage = Image;
        window.Image = function(...args) {
            const img = new origImage(...args);
            const origSrc = Object.getOwnPropertyDescriptor(img, 'src');
            Object.defineProperty(img, 'src', {
                get: () => origSrc?.get?.call(img) || '',
                set: function(value) {
                    if (shouldBlock(value)) {
                        blockedCount++;
                        log(`🚫 Blocked Image: ${value.slice(0, 40)}…`, true);
                        return;
                    }
                    if (origSrc?.set) origSrc.set.call(this, value);
                    else this.setAttribute('src', value);
                },
                configurable: true,
            });
            return img;
        };

        // ─── 6. createElement: proxy src for script/iframe ───
        const origCreateEl = document.createElement.bind(document);
        document.createElement = function(tag, options) {
            const el = origCreateEl(tag, options);
            const t = tag.toLowerCase();
            if (t === 'script' || t === 'iframe') {
                const origSet = Object.getOwnPropertyDescriptor(el, 'src');
                Object.defineProperty(el, 'src', {
                    get: () => origSet?.get?.call(el) || '',
                    set: function(value) {
                        if (shouldBlock(value)) {
                            blockedCount++;
                            log(`🚫 Blocked ${t} src: ${value.slice(0, 40)}…`, true);
                            return;
                        }
                        if (origSet?.set) origSet.set.call(this, value);
                        else this.setAttribute('src', value);
                    },
                    configurable: true,
                });
            }
            return el;
        };

        // ─── 7. setAttribute override ───
        const origSetAttribute = Element.prototype.setAttribute;
        Element.prototype.setAttribute = function(name, value) {
            if ((name === 'src' || name === 'href') && shouldBlock(value)) {
                blockedCount++;
                log(`🚫 Blocked setAttribute ${name}: ${value.slice(0, 40)}…`, true);
                return;
            }
            return origSetAttribute.call(this, name, value);
        };

        // ─── 8. DOM Insertion blockers (appendChild, insertBefore, replaceChild) ───
        const origAppendChild = Element.prototype.appendChild;
        Element.prototype.appendChild = function(node) {
            if (node && node.nodeType === 1 && isAdElement(node)) {
                blockedCount++;
                log(`🚫 Blocked appendChild: <${node.tagName.toLowerCase()}>`, true);
                return node; // silently drop
            }
            return origAppendChild.call(this, node);
        };

        const origInsertBefore = Element.prototype.insertBefore;
        Element.prototype.insertBefore = function(newNode, refNode) {
            if (newNode && newNode.nodeType === 1 && isAdElement(newNode)) {
                blockedCount++;
                log(`🚫 Blocked insertBefore: <${newNode.tagName.toLowerCase()}>`, true);
                return newNode;
            }
            return origInsertBefore.call(this, newNode, refNode);
        };

        const origReplaceChild = Element.prototype.replaceChild;
        Element.prototype.replaceChild = function(newNode, oldNode) {
            if (newNode && newNode.nodeType === 1 && isAdElement(newNode)) {
                blockedCount++;
                log(`🚫 Blocked replaceChild: <${newNode.tagName.toLowerCase()}>`, true);
                return oldNode;
            }
            return origReplaceChild.call(this, newNode, oldNode);
        };

        // ─── 9. MutationObserver (DOM scanning) ───
        let observer = null;

        function startObserver() {
            if (observer) observer.disconnect();
            observer = new MutationObserver((mutations) => {
                for (const m of mutations) {
                    for (const node of m.addedNodes) {
                        if (node.nodeType === 1) {
                            if (isAdElement(node)) {
                                blockedCount++;
                                log(`🚫 Removed ad <${node.tagName.toLowerCase()}>`, true);
                                node.remove();
                                continue;
                            }
                            // Scan descendants
                            if (node.querySelectorAll) {
                                const ads = node.querySelectorAll(
                                    '[id*="ad" i], [class*="ad" i], [data-ad], [data-ads], iframe[src*="doubleclick" i], iframe[src*="googlead" i], [data-ad-slot], [data-ad-client]'
                                );
                                for (const ad of ads) {
                                    if (isAdElement(ad)) {
                                        blockedCount++;
                                        log(`🚫 Removed ad <${ad.tagName.toLowerCase()}>`, true);
                                        ad.remove();
                                    }
                                }
                            }
                        }
                    }
                }
            });
            observer.observe(document.documentElement, { childList: true, subtree: true });
        }

        // ─── 10. Periodic cleanup ───
        function scanExisting() {
            const all = document.querySelectorAll('*');
            let removed = 0;
            for (const el of all) {
                if (isAdElement(el)) { el.remove();
                    removed++; }
            }
            if (removed > 0) {
                blockedCount += removed;
                log(`🧹 Cleaned ${removed} existing ad elements`, true);
            }
        }

        // ─── 11. Kill common ad global variables ───
        function nukeAdGlobals() {
            try {
                window.adsbygoogle = window.adsbygoogle || [];
                window.adsbygoogle.push = function() { /* no-op */ };
                window.google_ad_client = null;
                window.google_ad_slot = null;
                window.google_ad_width = null;
                window.google_ad_height = null;
                window._gaq = null;
                window.google_tracking = null;
                // Block DFP
                window.googletag = window.googletag || {};
                window.googletag.cmd = window.googletag.cmd || [];
                window.googletag.cmd.push = function() { /* no-op */ };
                window.googletag.pubads = function() { return { refresh: () => {}, display: () => {} }; };
                window.googletag.defineSlot = () => ({ addService: () => {}, setTargeting: () => {} });
                window.googletag.enableServices = () => {};
                console.log('🛡️ Azports Shield: Ad globals neutralized');
            } catch (_) {}
        }

        // ─── Init ───
        function init() {
            logContainer = document.getElementById('blockerLog');
            countEl = document.getElementById('adCount');
            nukeAdGlobals();
            startObserver();
            setTimeout(scanExisting, 300);

            setInterval(() => {
                const suspicious = document.querySelectorAll(
                    '[id*="ad" i], [class*="ad" i], [data-ad], [data-ads], iframe[src*="doubleclick" i], iframe[src*="googlead" i], [data-ad-slot], [data-ad-client]'
                );
                let found = 0;
                for (const el of suspicious) {
                    if (isAdElement(el)) { el.remove();
                        found++; }
                }
                if (found > 0) {
                    blockedCount += found;
                    log(`🧹 Periodic cleanup: removed ${found} ads`, true);
                }
            }, 4000);

            log('🛡️ Azports Shield ACTIVE (Network, DOM, Globals, src)', false);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

        window.__azportsShield = { blockedCount: () => blockedCount };
    })();


    /* ═══════════════════════════════════════════════════════════════
       📺  AZPORTS PLAYER — Channel Loader
       ═══════════════════════════════════════════════════════════════ */

    (function sportsPlayer() {
        'use strict';

        // ─── Channel Data (from user) ───
        const channels = [
            { id: 'sky_sports_mainevent', label: 'Sky Sports Main Event', icon: '⚽' },
            { id: 'sky_sports_cricket', label: 'Sky Sports Cricket', icon: '🏏' },
            { id: 'sky_sports_action', label: 'Sky Sports Action', icon: '🥊' },
            { id: 'sky_sports_footbal', label: 'Sky Sports Football', icon: '⚽' },
            { id: 'sky_sports_premier', label: 'Sky Sports Premier', icon: '🏆' },
            { id: 'sky_sports_f1', label: 'Sky Sports F1', icon: '🏎️' },
            { id: 'sky_sports_news', label: 'Sky Sports News', icon: '📰' },
            { id: 'Bt_sports1', label: 'BT Sport 1', icon: '🎯' },
            { id: 'Bt_sports2', label: 'BT Sport 2', icon: '🎯' },
            { id: 'ptv_sports', label: 'PTV Sports', icon: '🇵🇰' },
            { id: 'tenpk', label: 'Ten Sports PK', icon: '🎾' },
            { id: 'asports', label: 'A Sports', icon: '🏏' },
            { id: 'willow_cricket', label: 'Willow Cricket', icon: '🏏' },
            { id: 'willowextra', label: 'Willow Extra', icon: '🏏' },
            { id: 'sscricket', label: 'Sony Sports Cricket', icon: '🏏' },
            { id: 'star_sports1', label: 'Star Sports 1', icon: '⭐' },
            { id: 'star_sports3', label: 'Star Sports 3', icon: '⭐' },
            { id: 'ten2', label: 'Ten Sports 2', icon: '🎾' },
            { id: 'ten3', label: 'Ten Sports 3', icon: '🎾' },
            { id: 'ch1', label: 'Channel 1', icon: '📡' },
            { id: 'ch2', label: 'Channel 2', icon: '📡' },
        ];

        const BASE_URL = 'https://live.khantv.pk/update/?id=';

        // ─── DOM refs ───
        const iframe = document.getElementById('playerIframe');
        const overlay = document.getElementById('playerOverlay');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlaySub = document.getElementById('overlaySub');
        const currentChannelName = document.getElementById('currentChannelName');
        const channelStatus = document.getElementById('channelStatus');
        const channelGrid = document.getElementById('channelGrid');
        const channelCountLabel = document.getElementById('channelCountLabel');
        const channelCount = document.getElementById('channelCount');

        let activeChannelId = null;
        let isIframeLoaded = false;

        // ─── Helpers ───
        function getChannelUrl(id) {
            return BASE_URL + id;
        }

        function getChannelById(id) {
            return channels.find(c => c.id === id);
        }

        // ─── Load channel ───
        function loadChannel(id) {
            const channel = getChannelById(id);
            if (!channel) return;

            activeChannelId = id;
            const url = getChannelUrl(id);

            iframe.src = url;
            isIframeLoaded = false;

            currentChannelName.textContent = `${channel.icon} ${channel.label}`;
            channelStatus.textContent = 'Loading…';

            overlay.classList.remove('player__overlay--hidden');
            overlayTitle.textContent = `📡 ${channel.label}`;
            overlaySub.textContent = 'Connecting to stream…';

            document.querySelectorAll('.channel-item').forEach(el => {
                el.classList.toggle('channel-item--active', el.dataset.id === id);
            });

            clearTimeout(window._overlayTimer);
            window._overlayTimer = setTimeout(() => {
                overlay.classList.add('player__overlay--hidden');
            }, 3000);

            iframe.onload = function() {
                isIframeLoaded = true;
                overlay.classList.add('player__overlay--hidden');
                channelStatus.textContent = 'Streaming';
            };

            setTimeout(() => {
                if (!isIframeLoaded) {
                    overlaySub.textContent = '⏳ Stream loading… (may take a moment)';
                }
            }, 4500);
        }

        // ─── Render channels ───
        function renderChannels() {
            channelGrid.innerHTML = '';
            channels.forEach(ch => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                div.dataset.id = ch.id;
                div.innerHTML = `
              <span class="channel-item__icon">${ch.icon}</span>
              <span class="channel-item__name">${ch.label}</span>
              <span class="channel-item__badge">LIVE</span>
            `;
                div.addEventListener('click', () => loadChannel(ch.id));
                div.addEventListener('touchstart', () => {}, { passive: true });
                channelGrid.appendChild(div);
            });

            const count = channels.length;
            channelCountLabel.textContent = `${count} available`;
            channelCount.textContent = count;
        }

        // ─── Load default ───
        function loadDefaultChannel() {
            if (channels.length > 0) {
                setTimeout(() => loadChannel(channels[0].id), 700);
            }
        }

        // ─── Init ───
        function init() {
            renderChannels();
            loadDefaultChannel();

            iframe.addEventListener('error', function() {
                channelStatus.textContent = '⚠️ Stream unavailable';
                overlaySub.textContent = '⚠️ Could not load stream. Try another channel.';
                overlay.classList.remove('player__overlay--hidden');
            });

            window.__azportsPlayer = { channels, loadChannel };
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

    })();
</script>
